apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

 name: streamlit-plotter-app

 namespace: argocd

spec:

 project: default

 source:

   repoURL: https://github.com/habert75/streamlit_ploter

   targetRevision: HEAD

   path: "cd"

 destination:

   server: https://kubernetes.default.svc

   namespace: default

 syncPolicy:

   automated:

     selfHeal: true

     prune: true